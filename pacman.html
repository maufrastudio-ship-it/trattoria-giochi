<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pac-Man Pasta</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #gameCanvas {
            border: 3px solid var(--wood-color);
            background-color: #2c1810;
            border-radius: 10px;
            display: block;
            margin: 10px auto;
            max-width: 100%;
            touch-action: none;
        }
    </style>
</head>
<body>

    <!-- LOADER -->
    <div id="page-loader" class="loader-overlay">
        <div class="loader-emoji">🍝</div>
        <p class="loader-text">La Nonna sta preparando...</p>
    </div>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('page-loader').classList.add('hidden');
            }, 900);
        });
    </script>

    <h2>🍝 Pac-Man Pasta</h2>
    <p id="score" style="font-weight: bold;">Punti: 0 | Spaghetti: 0</p>
    
    <canvas id="gameCanvas" width="320" height="320"></canvas>
    
    <!-- D-PAD CONTROLS -->
    <div class="d-pad">
        <div class="d-row">
            <button class="d-btn" data-dir="up">⬆️</button>
        </div>
        <div class="d-row">
            <button class="d-btn" data-dir="left">⬅️</button>
            <button class="d-btn" data-dir="down">⬇️</button>
            <button class="d-btn" data-dir="right">➡️</button>
        </div>
    </div>

    <button class="btn-start" onclick="initGame()">🔄 Ricomincia</button>
    <button class="btn-start" onclick="location.href='index.html'">🏠 Menu</button>

    <script src="pacman.js"></script>
</body>
</html>
