<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz di Cucina</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LOADER -->
    <div id="page-loader" class="loader-overlay">
        <div class="loader-emoji">🍝</div>
        <p class="loader-text">La Nonna sta preparando...</p>
    </div>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('page-loader').classList.add('hidden');
            }, 900);
        });
    </script>

    <h2>🍝 Quiz di Cucina</h2>
    <!-- Dopo <h2>: -->
<p id="round-display" style="font-weight:bold;">Round 1</p>
<p id="status" style="font-style:italic; min-height:1.5em;"></p>
    <p id="question">Caricamento domanda...</p>
    
    <div id="answers" style="margin: 20px 0;"></div>

    <p id="score" style="font-size: 1.2rem; margin-top: 20px;"></p>

    <button class="btn-start" onclick="location.href='index.html'">🏠 Torna al Menu</button>

    <script src="quiz.js"></script>
</body>
</html>
