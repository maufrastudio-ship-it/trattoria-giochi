<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Colora la Nonna</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .coloring-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            border: 4px solid var(--wood-color);
            border-radius: 10px;
            background: white;
            overflow: hidden;
            cursor: crosshair;
        }
        canvas {
            display: block;
            width: 100%;
            touch-action: none;
        }
        .palette {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
            padding: 10px;
            background: white;
            border-radius: 10px;
            border: 2px solid var(--wood-color);
        }
        .color-swatch {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .color-swatch.active {
            border-color: var(--text-color);
            transform: scale(1.15);
        }
    </style>
</head>
<body>

    <!-- LOADER -->
    <div id="page-loader" class="loader-overlay">
        <div class="loader-emoji">🎨</div>
        <p class="loader-text">La Nonna sta preparando...</p>
    </div>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('page-loader').classList.add('hidden'), 900);
        });
    </script>

    <h2>🎨 Colora la Nonna</h2>
    <p>Tocca un colore, poi tocca il disegno!</p>

    <!-- Tavolozza dei colori -->
    <div class="palette" id="palette">
        <div class="color-swatch active" style="background: #d9534f" data-color="217, 83, 79"></div> <!-- Rosso Pomodoro -->
        <div class="color-swatch" style="background: #f0ad4e" data-color="240, 173, 78"></div> <!-- Giallo Pane -->
        <div class="color-swatch" style="background: #5cb85c" data-color="92, 184, 92"></div> <!-- Verde Basilico -->
        <div class="color-swatch" style="background: #5bc0de" data-color="91, 192, 222"></div> <!-- Azzurro Cielo -->
        <div class="color-swatch" style="background: #8b5a2b" data-color="139, 90, 43"></div> <!-- Marrone Legno -->
        <div class="color-swatch" style="background: #9b59b6" data-color="155, 89, 182"></div> <!-- Viola Vino -->
        <div class="color-swatch" style="background: #ecf0f1" data-color="236, 240, 241"></div> <!-- Bianco (Gomma) -->
        <div class="color-swatch" style="background: #000000" data-color="0, 0, 0"></div> <!-- Nero -->
    </div>

    <!-- Area disegno -->
    <div class="coloring-container">
        <canvas id="colorCanvas" width="800" height="600"></canvas>
    </div>

    <div class="action-buttons">
        <button class="btn-start" onclick="resetCanvas()">️ Cancella Tutto</button>
        <button class="btn-start" onclick="location.href='index.html'">🏠 Menu</button>
    </div>

    <script src="coloring.js"></script>
</body>
</html>
