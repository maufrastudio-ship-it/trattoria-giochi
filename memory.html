<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory della Pizza</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LOADER -->
    <div id="page-loader" class="loader-overlay">
        <div class="loader-emoji">🍕</div>
        <p class="loader-text">La Nonna sta preparando...</p>
    </div>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('page-loader').classList.add('hidden');
            }, 900);
        });
    </script>

    <h2>🍕 Memory della Pizza</h2>
    <!-- Dopo <h2>🍕 Memory della Pizza</h2> aggiungi: -->
<p id="level-display" style="font-weight:bold; color:var(--wood-color);">Livello 1</p>
<p id="status" style="font-style:italic; min-height:1.5em;"></p>

<!-- Dopo il canvas, prima dei pulsanti: -->
<button class="btn-start" id="next-btn" onclick="nextLevel()" style="display:none;">▶️ Prossimo Livello</button>
    <p>Trova tutte le coppie!</p>
    
    <div class="memory-grid" id="game-board"></div>

    <button class="btn-start" onclick="location.href='index.html'">🏠 Torna al Menu</button>

    <script src="games.js"></script>
</body>
</html>
