<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory della Pizza</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- INIZIO LOADER -->
    <div id="page-loader" class="loader-overlay">
        <div class="loader-emoji"></div>
        <p class="loader-text">La Nonna sta preparando...</p>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('page-loader').classList.add('hidden');
            }, 900);
        });
    </script>
    <!-- FINE LOADER -->

    <h2>🍕 Memory della Pizza</h2>
    <p>Trova tutte le coppie!</p>
    
    <div class="memory-grid" id="game-board">
        <!-- Le carte vengono generate da JavaScript -->
    </div>

    <button class="btn-start" onclick="location.href='index.html'">Torna al Menu</button>

    <script src="games.js"></script>
</body>
</html>
