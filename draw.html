<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Disegna il Piatto</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #drawCanvas {
            border: 3px solid var(--wood-color);
            background-color: #fff8e1;
            border-radius: 10px;
            display: block;
            margin: 10px auto;
            max-width: 100%;
            touch-action: none;
            cursor: crosshair;
        }
        .draw-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }
        .color-btn {
            width: 45px; height: 45px;
            border-radius: 50%;
            border: 3px solid var(--wood-color);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .color-btn.active {
            transform: scale(1.2);
            box-shadow: 0 0 0 3px var(--accent-color);
        }
        .tool-btn {
            padding: 12px 20px;
            font-family: 'Playfair Display', serif;
            background: var(--wood-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }
        .tool-btn:active { background: #6b4423; }
        
        /* Template selector styles */
        .template-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .template-btn {
            width: 50px; height: 50px;
            border: 2px solid var(--wood-color);
            border-radius: 8px;
            background: white;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            transition: all 0.2s;
        }
        .template-btn.active {
            border-color: var(--accent-color);
            background: #ffeaa7;
            transform: scale(1.1);
        }
        .template-btn.locked {
            opacity: 0.4;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <!-- LOADER -->
    <div id="page-loader" class="loader-overlay">
        <div class="loader-emoji">🎨</div>
        <p class="loader-text">La Nonna sta preparando...</p>
    </div>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('page-loader').classList.add('hidden'), 900);
        });
    </script>

    <h2>🎨 Disegna il Piatto</h2>
    
    <!-- Template selector + status -->
    <div id="template-selector" class="template-selector"></div>
    <p id="status" style="font-style:italic; min-height:1.5em;"></p>
    
    <p style="margin-top:5px;">Libera la fantasia mentre aspetti la pasta!</p>

    <!-- Colori -->
    <div class="draw-controls">
        <button class="color-btn active" style="background:#d9534f" data-color="#d9534f"></button>
        <button class="color-btn" style="background:#f0ad4e" data-color="#f0ad4e"></button>
        <button class="color-btn" style="background:#5cb85c" data-color="#5cb85c"></button>
        <button class="color-btn" style="background:#8b5a2b" data-color="#8b5a2b"></button>
        <button class="color-btn" style="background:#333" data-color="#333"></button>
        <button class="color-btn" style="background:#fff; border-color:#ccc" data-color="#fff" title="Gomma"></button>
    </div>

    <!-- Canvas -->
    <canvas id="drawCanvas" width="340" height="340"></canvas>

    <!-- Pulsanti azione -->
    <div class="draw-controls">
        <button class="tool-btn" id="completeBtn">✅ Completato</button>
        <button class="tool-btn" id="clearBtn">🗑️ Nuovo</button>
        <button class="tool-btn" onclick="location.href='index.html'">🏠 Menu</button>
    </div>

    <script src="draw.js"></script>
</body>
</html>
