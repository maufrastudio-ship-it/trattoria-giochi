<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trova le Differenze</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="page-loader" class="loader-overlay"><div class="loader-emoji"></div><p class="loader-text">La Nonna sta preparando...</p></div>
    <script>window.addEventListener('load', () => setTimeout(() => document.getElementById('page-loader').classList.add('hidden'), 900));</script>

    <h2> Trova le Differenze</h2>
    <p id="diff-status">Trova 5 differenze tra le due tavole!</p>
    
    <div class="diff-container">
        <div class="diff-scene left">
            <div class="scene-table"></div>
            <div class="scene-bread"></div>
            <div class="scene-wine"></div>
            <div class="scene-pot"></div>
            <div class="scene-spoon"></div>
            <div class="scene-flower"></div>
        </div>
        <div class="diff-scene right">
            <div class="scene-table"></div>
            <div class="scene-bread"></div>
            <div class="scene-wine"></div>
            <div class="scene-pot"></div>
            <div class="scene-spoon"></div>
            <div class="scene-flower"></div>
            <div class="diff-target diff-1" data-id="1"></div>
            <div class="diff-target diff-2" data-id="2"></div>
            <div class="diff-target diff-3" data-id="3"></div>
            <div class="diff-target diff-4" data-id="4"></div>
            <div class="diff-target diff-5" data-id="5"></div>
        </div>
    </div>

    <button class="btn-start" onclick="location.href='index.html'">🏠 Menu</button>
    <script src="differenze.js"></script>
</body>
</html>
